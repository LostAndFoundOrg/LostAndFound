spring.application.name=lost-found

# Database (Исправлено на sslmode=disable)
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=disable
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Gemini
gemini.api.key=${GEMINI_API_KEY:}

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Admin credentials
# ADMIN_PASSWORD_HASH должен быть BCrypt-хэшем пароля.
# Сгенерировать: AdminAuthService.encodePassword("ваш_пароль")
# Пример для "admin123": $2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy
admin.username=${ADMIN_USERNAME:admin}
admin.password.hash=${ADMIN_PASSWORD_HASH:$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy}

# CORS (Оставили чистую переменную окружения)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Logging
logging.level.AUDIT=INFO
logging.level.SECURITY=WARN
logging.level.com.example.lostfound=INFO

# Session timeout
server.servlet.session.timeout=30m
