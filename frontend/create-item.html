<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Item | Lost & Found</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div>
      <h1>Create Item</h1>
      <p>Report a lost or found item</p>
    </div>

    <nav>
      <a href="index.html" class="nav-link">Back to home</a>
    </nav>
  </header>

  <main class="main">
    <section class="form-section">
      <h2>Item information</h2>

      <form id="itemForm" class="item-form">

        <label for="type">Type</label>
        <select id="type" required>
          <option value="LOST">Lost item</option>
          <option value="FOUND">Found item</option>
        </select>

        <label for="title">Title</label>
        <input
          type="text"
          id="title"
          placeholder="Black Samsung charger"
          required
        >

        <label for="description">Description</label>
        <textarea
          id="description"
          placeholder="I lost my black Samsung charger near the library."
          required
        ></textarea>

        <label for="categoryId">Category</label>
        <select id="categoryId" required>
          <option value="">Choose category</option>
        </select>

        <label for="location">Location</label>
        <input
          type="text"
          id="location"
          placeholder="Library"
          required
        >

        <label for="eventDate">Event date</label>
        <input
          type="date"
          id="eventDate"
          required
        >

        <label for="imageUrl">Image URL</label>
        <input
          type="text"
          id="imageUrl"
          placeholder="https://example.com/image.jpg"
        >

        <label for="contactName">Contact name</label>
        <input
          type="text"
          id="contactName"
          placeholder="Eldana"
          required
        >

        <label for="contactMethod">Contact method</label>
        <input
          type="text"
          id="contactMethod"
          placeholder="Telegram, WhatsApp, Phone"
          required
        >

        <label for="contactValue">Contact value</label>
        <input
          type="text"
          id="contactValue"
          placeholder="@username or phone number"
          required
        >

        <button type="submit">Submit item</button>
      </form>

      <p id="formMessage"></p>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/create-item.js"></script>
</body>
</html>
